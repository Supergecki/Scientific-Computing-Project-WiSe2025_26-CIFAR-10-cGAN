model:
  latent_dim: 100  # dimension of the latent space
  embed_dim: 128  # dimension of the class label embedding
  generator_channels: [512, 256, 128, 64]  # changed over previous iteration to accomodate to image size 32 instead of 64
  discriminator_channels: [64, 128, 256, 512]

training:
  batch_size: 128  # I do not own a CUDA-compatible GPU, so setting this a bit lower
  num_epochs: 100  # might need to be regulated downwards? especially for testing purposes
  lr_g: 0.0001  # generator's learning rate, consider TTUR (generator tends to be slower)
  lr_d: 0.0004  # discriminator's learning rate, consider TTUR (discriminator tends to be faster)
  beta1: 0.0 # best practice for hinge loss and spectral normalization
  beta2: 0.999  # parameters for Adam optimizer

data:
  num_workers: 2 # number of parallel subprocesses used for data loading
  num_classes: 10
  image_size: 32  # these parameters are for working with CIFAR-10, they are incorrect
  # in the example in the project description
  data_root: "./data/data/raw" # default file path for CIFAR-10 dataset after download
seed: 42  # random seed, this choice is arbitrary but should stay the same for reproducibility
